<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Wedding Times - Premium</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="book-container">
  <div id="book" class="book">

    <!-- PAGE 1 -->
    <div id="p1" class="paper" style="z-index:3;">
      <div class="front">
        <div class="content">
          <hr>
          <h1 class="old-english-font text-center">The Wedding Time</h1>
          <hr>

          <div class="text-center bold">
            STÉPHANIE & MOHAMED
          </div>

          <img src="page-1.jpg">
          <p class="text-center">Swipe or Tap →</p>
        </div>
      </div>

      <div class="back">
        <div class="content">
          <h2 class="font-old-london">Our Story</h2>
          <p>Le match parfait : Leur histoire commence ici...</p>
          <img src="page-2-1.jpg">
        </div>
      </div>
    </div>

    <!-- PAGE 2 -->
    <div id="p2" class="paper" style="z-index:2;">
      <div class="front">
        <div class="content">
          <h2 class="font-old-london">Invitation</h2>
          <p>Nous vous attendons le 27 Juin 2026.</p>

          <div class="box">
            15h00 - Paroisse St Joseph
          </div>

          <img src="page-2-2.jpg">
        </div>
      </div>

      <div class="back">
        <div class="content">
          <h2 class="font-old-london">Thank You</h2>
          <p>Merci pour votre présence ❤️</p>
          <img src="page-3.jpg">
        </div>
      </div>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
